server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: zone-service
          uri: lb://zone-service
          predicates:
            - Path=/api/zones/**

        - id: sensor-service
          uri: lb://sensor-service
          predicates:
            - Path=/api/sensors/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka